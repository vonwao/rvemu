<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>rvemu — Linux in your browser</title>
<style>
  body { background: #0b0e14; color: #cdd6f4; font-family: ui-monospace, Menlo, monospace; margin: 0; padding: 16px; }
  h1 { font-size: 16px; font-weight: 600; margin: 0 0 4px; }
  #status { color: #7f849c; font-size: 12px; margin-bottom: 8px; }
  #term { background: #000; color: #d0d0d0; padding: 12px; font-size: 14px; line-height: 1.25;
          border-radius: 6px; outline: none; width: fit-content; white-space: pre; }
  #term:focus { box-shadow: 0 0 0 2px #45475a; }
  .inv { background: #d0d0d0; color: #000; }
  .cur { background: #7fd07f; color: #000; }
  .f0{color:#3c3c3c}.f1{color:#e06c75}.f2{color:#98c379}.f3{color:#e5c07b}
  .f4{color:#61afef}.f5{color:#c678dd}.f6{color:#56b6c2}.f7{color:#e6e6e6}
  .b1{background:#e06c75}.b2{background:#98c379}.b3{background:#e5c07b}
  .b4{background:#61afef}.b5{background:#c678dd}.b6{background:#56b6c2}.b7{background:#e6e6e6;color:#000}
</style>
</head>
<body>
<h1>rvemu — RISC-V rv64imac emulator, booting Linux 6.12 + BusyBox</h1>
<div id="status">loading…</div>
<canvas id="fb" width="800" height="600" title="click for fullscreen" style="display:none; background:#000; border-radius:6px; margin-bottom:10px; width:100%; max-width:1200px; image-rendering:pixelated; cursor:zoom-in;"></canvas>
<div id="term" tabindex="0"></div>
<script src="term.js"></script>
<script src="net.js"></script>
<script>
const termEl = document.getElementById('term');
const status = document.getElementById('status');
const screen = new Screen(80, 24);
let exports, t0;

const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;');

function render() {
  let html = '';
  for (let r = 0; r < screen.rows; r++) {
    for (let c = 0; c < screen.cols; c++) {
      const cell = screen.grid[r][c];
      const isCur = screen.cursorVisible && r === screen.cy && c === screen.cx;
      const cls = [];
      if (isCur) cls.push('cur');
      else {
        if (cell.inv) cls.push('inv');
        if (cell.fg !== null) cls.push('f' + cell.fg);
        if (cell.bg !== null) cls.push('b' + cell.bg);
      }
      html += cls.length ? `<span class="${cls.join(' ')}">${esc(cell.ch)}</span>` : esc(cell.ch);
    }
    html += '\n';
  }
  termEl.innerHTML = html;
}

function drain() {
  const n = Number(exports.console_out_len());
  if (n > 0) {
    screen.write(new Uint8Array(exports.memory.buffer, Number(exports.console_out_ptr()), n));
    exports.console_out_clear();
    for (const b of screen.takeReplies()) exports.console_in(b);
    render();
  }
}

// Network: guest frames (length-prefixed) go to the JS gateway; gateway
// replies are injected back into the virtio NIC's rx queue.
let gateway;
function drainNet() {
  const n = Number(exports.net_tx_len());
  if (!n) return;
  const buf = new Uint8Array(exports.memory.buffer, Number(exports.net_tx_ptr()), n).slice();
  exports.net_tx_clear();
  let i = 0;
  while (i + 2 <= buf.length) {
    const len = buf[i] | (buf[i + 1] << 8);
    gateway.onFrame(buf.subarray(i + 2, i + 2 + len));
    i += 2 + len;
  }
}

// Adaptive chunking: keystrokes reach the emulator only between run()
// calls, so each call targets ~40ms of wall time for responsive input.
// Time pacing: the guest RTC (10MHz) must not run ahead of wall time, or
// idle fast-forward makes games' clocks sprint and an idle tab burns a
// whole core. When the guest is ahead, sleep the difference (capped).
let chunk = 2000000n;
let mtime0 = 0, wall0 = 0;
let mipsR0 = 0, mipsT0 = 0, mipsText = '…';
function pump() {
  const t = performance.now();
  // Guest-time ceiling: wall elapsed + 50ms slack, in 10MHz ticks.
  const ceil = BigInt(mtime0) + BigInt(Math.floor((performance.now() - wall0 + 50) * 10000));
  const halted = exports.run_paced(chunk, ceil) === 1;
  const dt = performance.now() - t;
  if (dt < 25 && chunk < 100000000n) chunk *= 2n;
  else if (dt > 70 && chunk > 250000n) chunk /= 2n;
  drain();
  drainNet();
  blitFb();
  // Windowed speed: instructions retired over the last ~500ms of wall time,
  // so an idle (paced) guest reads "idle" instead of a decaying average.
  const nowMs = performance.now();
  if (nowMs - mipsT0 >= 500) {
    const r = Number(exports.retired());
    const m = (r - mipsR0) / 1e6 / ((nowMs - mipsT0) / 1000);
    mipsText = m < 1 ? 'idle' : `${m.toFixed(0)} MIPS`;
    mipsR0 = r; mipsT0 = nowMs;
  }
  const guestMs = (Number(exports.mtime()) - mtime0) / 10000; // 10MHz -> ms
  const wallMs = performance.now() - wall0;
  let ahead = guestMs - wallMs;
  // If the guest fell behind wall time (CPU-bound phase), rebase so it never
  // banks catch-up credit; run_paced's ceiling handles the ahead side.
  if (ahead < 0) {
    wall0 = performance.now();
    mtime0 = Number(exports.mtime());
    ahead = 0;
  }
  status.textContent = `retired: ${exports.retired().toLocaleString()} instructions · ${mipsText} · ` +
                       (halted ? 'halted' : 'running — click the terminal and type when the prompt appears');
  if (!halted) setTimeout(pump, ahead > 5 ? Math.min(ahead, 250) : 0);
}

// Framebuffer blit: 800x600 rgb565 -> canvas, ~10fps, shown once the guest
// draws its first pixel (the kernel boot logo).
const fbCanvas = document.getElementById('fb');
const fbCtx = fbCanvas.getContext('2d');
const fbImage = fbCtx.createImageData(800, 600);
let fbVisible = false, lastBlit = 0;
function blitFb() {
  const now = performance.now();
  if (now - lastBlit < 100) return;
  lastBlit = now;
  const len = Number(exports.vram_len());
  if (!len) return;
  const vram = new Uint8Array(exports.memory.buffer, Number(exports.vram_ptr()), len);
  const px = fbImage.data;
  let any = false;
  for (let i = 0, j = 0; i < 800 * 600 * 2; i += 2, j += 4) {
    const v = vram[i] | (vram[i + 1] << 8);
    if (v) any = true;
    px[j] = (v >> 8) & 0xf8;
    px[j + 1] = (v >> 3) & 0xfc;
    px[j + 2] = (v << 3) & 0xf8;
    px[j + 3] = 255;
  }
  if (any && !fbVisible) { fbVisible = true; fbCanvas.style.display = 'block'; }
  if (fbVisible) fbCtx.putImageData(fbImage, 0, 0);
}

const utf8 = new TextEncoder();
const send = s => { for (const b of utf8.encode(s)) exports.console_in(b); };
function onKey(e) {
  if (e.metaKey) return;
  if (e.ctrlKey && e.key.length === 1) {
    const c = e.key.toUpperCase().charCodeAt(0);
    if (c >= 64 && c < 96) { exports.console_in(c - 64); e.preventDefault(); }
    return;
  }
  const map = {
    Enter: '\r', Backspace: '\x7f', Tab: '\t', Escape: '\x1b',
    ArrowUp: '\x1b[A', ArrowDown: '\x1b[B', ArrowRight: '\x1b[C', ArrowLeft: '\x1b[D',
    Home: '\x1b[H', End: '\x1b[F', Delete: '\x1b[3~',
  };
  if (map[e.key]) send(map[e.key]);
  else if (e.key.length === 1) send(e.key);
  else return;
  e.preventDefault();
}
termEl.addEventListener('keydown', onKey);
// Fullscreen screen: click the canvas; keystrokes keep flowing to the guest.
fbCanvas.addEventListener('click', () => {
  if (document.fullscreenElement === fbCanvas) document.exitFullscreen();
  else if (fbCanvas.requestFullscreen) fbCanvas.requestFullscreen();
});
document.addEventListener('keydown', (e) => {
  if (document.fullscreenElement === fbCanvas) onKey(e);
});

(async () => {
  status.textContent = 'fetching emulator + Linux image…';
  const [mod, image] = await Promise.all([
    WebAssembly.instantiateStreaming(fetch('rvemu_wasm.wasm'), {}),
    fetch('fw_payload.elf').then(r => r.arrayBuffer()),
  ]);
  exports = mod.instance.exports;
  const ptr = exports.image_alloc(image.byteLength);
  new Uint8Array(exports.memory.buffer, ptr, image.byteLength).set(new Uint8Array(image));
  if (exports.boot(256) !== 0) { status.textContent = 'ELF load failed'; return; }
  gateway = new NetGateway((frame) => {
    const p = Number(exports.net_rx_alloc(frame.length));
    new Uint8Array(exports.memory.buffer, p, frame.length).set(frame);
    exports.net_rx_push();
  }, (url, opts) => fetch(url, opts));
  render();
  termEl.focus();
  t0 = performance.now();
  mtime0 = Number(exports.mtime());
  wall0 = t0;
  mipsT0 = t0;
  pump();
})();
</script>
</body>
</html>
